  <text x="250" y="185" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700">SPARKLA</text>
  <text x="250" y="220" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Tahoma, sans-serif" font-size="14">Calming Ginger</text>
  <text x="450" y="185" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" font-weight="700">SPARKLA</text>
  <text x="450" y="220" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Tahoma, sans-serif" font-size="14">Calming Lime</text>
  <circle cx="210" cy="255" r="7" fill="#ffffff" opacity="0.85"/>
  <circle cx="290" cy="273" r="5" fill="#ffffff" opacity="0.7"/>
  <circle cx="425" cy="250" r="7" fill="#ffffff" opacity="0.85"/>
  <circle cx="490" cy="272" r="5" fill="#ffffff" opacity="0.7"/>
