<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="title desc">
  <title id="title">Sparkla Product Concept</title>
  <desc id="desc">Two Sparkla can illustrations in blue and lime flavors.</desc>
  <defs>
    <linearGradient id="canBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ca1ff"/>
      <stop offset="100%" stop-color="#2f7bff"/>
    </linearGradient>
    <linearGradient id="canLime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#75e4ba"/>
      <stop offset="100%" stop-color="#29c7b8"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="#f4fbff"/>
  <circle cx="120" cy="70" r="18" fill="#d8edff"/>
  <circle cx="630" cy="110" r="24" fill="#d4fff5"/>
  <rect x="180" y="75" width="140" height="260" rx="28" fill="url(#canBlue)"/>
  <rect x="380" y="75" width="140" height="260" rx="28" fill="url(#canLime)"/>
  <rect x="190" y="75" width="120" height="18" rx="9" fill="#dfe9ff" opacity="0.8"/>
